<!DOCTYPE html>
<html>
<head>
  <title>Evites Ballet & Dansschool</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2bb673">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Evites">
  <link rel="apple-touch-icon" href="icon.png">
</head>

<body>

<div class="container">
  <h1>Evites Ballet & Dansschool</h1>

 <div id="classes"></div>

<h2 id="status">Select a class</h2>
<h3 id="selectedClass"></h3>

<!-- QR -->
<div class="qr-container"></div>

<!-- Button -->
<button id="openCheckin">Checked-in list</button>
</div>

<!-- Slide-up panel -->
<div id="checkinPanel" class="panel">
  <div class="panel-content">

    <!-- drag handle -->
    <div class="handle"></div>

    <p id="checkinCount">0 students checked-in</p>

    <ul id="studentList"></ul>

    <button id="addStudent">+ Add student</button>

  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
