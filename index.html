<!DOCTYPE html>
<html>
<head>
  <title>Evites Ballet & Dansschool</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2bb673">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Evites">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

<div class="container">
  <h1>Evites Ballet & Dansschool</h1>

  <div class="view-toggle">
    <button id="btnMonth" class="toggle-btn active">Month</button>
    <button id="btnWeek" class="toggle-btn">Week</button>
  </div>

  <div class="cal-nav">
    <button class="nav-btn" id="prevBtn">‹</button>
    <span id="calTitle"></span>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>

  <div id="calendarGrid"></div>
</div>

<!-- Slide-up panel -->
<div id="checkinPanel" class="panel">
  <div class="panel-content">
    <div class="handle"></div>
    <h3 id="panelTitle"></h3>

    <div id="panelNoClass" style="text-align: center; padding: 20px 0;">
      <p style="color: #999; margin-bottom: 12px;">No class scheduled for this day</p>
      <button id="addClassBtn">+ Add Class</button>
    </div>

    <div id="panelWithClass" style="display: none;">
      <p id="checkinCount">0 students checked-in</p>
      <ul id="studentList"></ul>
      <button id="showQrBtn">Show QR Code</button>
      <div id="qrWrapper">
        <canvas id="qrCanvas"></canvas>
      </div>
      <button id="removeClassBtn">Remove Class</button>
    </div>
  </div>
</div>

<!-- Class Selection Modal -->
<div id="classModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Select a Class</h2>
      <button class="modal-close" id="closeModal">✕</button>
    </div>
    <div class="modal-body" id="classListContainer"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
